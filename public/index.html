<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ben Fainlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
/* ── Tokens ───────────────────────────────────────────────────────────────── */
:root {
  --bg:      #0d0c0a;
  --surface: #161512;
  --ink:     #ddd8d0;
  --muted:   #5a5652;
  --dim:     #252320;
  --warm:    #c4b8a6;
  --max:     720px;
  --pad:     clamp(20px, 5vw, 48px);
}
[data-theme="light"] {
  --bg:      #f4f1eb;
  --surface: #ebe8e0;
  --ink:     #141210;
  --muted:   #8c8880;
  --dim:     #d8d3ca;
  --warm:    #4a4744;
}

/* ── Reset ────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  line-height: 1.6;
  transition: background .2s, color .2s;
  min-height: 100vh;
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.wrap { max-width: calc(var(--max) + var(--pad) * 2); margin: 0 auto; padding: 0 var(--pad); }

/* ── Header ───────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 32px 0 40px;
  gap: 16px;
}
.site-name {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  font-weight: 400;
  color: var(--ink);
  cursor: pointer;
  user-select: none;
  letter-spacing: -.01em;
}
.header-right { display: flex; align-items: center; gap: 20px; }
nav { display: flex; gap: 4px; }
nav button {
  background: none;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: .8rem;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: .04em;
  text-transform: uppercase;
  transition: color .15s, background .15s;
}
nav button:hover { color: var(--ink); }
nav button.active { color: var(--ink); background: var(--dim); }
.theme-toggle {
  background: none;
  border: none;
  font-size: 1rem;
  color: var(--muted);
  cursor: pointer;
  padding: 4px 6px;
  transition: color .15s;
  line-height: 1;
}
.theme-toggle:hover { color: var(--ink); }

/* ── Views ────────────────────────────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; animation: fadein .2s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── Work view — intro ────────────────────────────────────────────────────── */
.intro { padding-bottom: 40px; border-bottom: 1px solid var(--dim); }
.intro p {
  font-size: clamp(.9rem, 2.5vw, 1rem);
  color: var(--warm);
  line-height: 1.7;
  max-width: 58ch;
}
.intro strong { color: var(--ink); font-weight: 500; }

.intro-row {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  position: relative;
}
.intro-bio { flex: 1.4; min-width: 0; }

/* ── Links zone ───────────────────────────────────────────────────────────── */
.links-zone {
  flex: 1;
  position: relative;
  padding: 2px 0 0 24px;
  min-width: 0;
  border-left: 1px solid var(--dim);
}

.links-content {
  position: relative;
  z-index: 1;
  /* Fixed height (~2/3 of the bio-to-divider space) so longer item text
     never pushes the page below down — overflow is clipped and title/desc
     are line-clamped instead. The bg overlay is a sibling, outside this
     box, so it isn't clipped by this. */
  height: 168px;
  overflow: hidden;
}

.links-bg {
  position: absolute;
  top: -12px;
  bottom: -36px;
  left: 0;
  right: 0;
  background-size: cover;
  background-position: center 30%;
  opacity: 0;
  pointer-events: none;
  transition: opacity .45s ease;
  border-radius: 12px;
  z-index: 0;
}

.links-content .links-outlet {
  display: inline-block;
  font-family: 'Inter', sans-serif;
  font-size: .7rem;
  font-weight: 400;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--dim);
  padding: 3px 8px;
  border-radius: 16px;
  margin-bottom: 8px;
  transition: opacity .2s;
}

.links-title {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  overflow: hidden;
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(.85rem, 1.6vw, .98rem);
  color: var(--ink);
  line-height: 1.25;
  text-decoration: none;
  margin-bottom: 6px;
  transition: opacity .2s;
}
.links-title:hover { text-decoration: underline; text-underline-offset: 3px; }

.links-content .links-desc {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 3;
  overflow: hidden;
  font-size: .77rem;
  color: var(--warm);
  line-height: 1.75;
  margin-bottom: 10px;
  transition: opacity .2s;
  max-width: 36ch;
}

.links-controls { display: flex; align-items: center; gap: 10px; }
.links-dots { display: flex; gap: 5px; align-items: center; }

.links-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--dim);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: background .2s;
}
.links-dot.active { background: var(--muted); }

.links-next {
  font-size: .58rem;
  color: var(--muted);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  letter-spacing: .04em;
  transition: color .15s;
}
.links-next:hover { color: var(--ink); }

@media (max-width: 680px) {
  .intro-row { flex-direction: column; }

  .links-zone {
    width: 100%;
    padding: 16px 0 0;
    border-top: 1px solid var(--dim);
    border-left: 0;
    margin-top: 4px;
  }

  .links-content { height: auto; overflow: visible; }

  /* Hover doesn't apply on touch devices */
  .links-bg { display: none; }

  .links-title {
    font-size: 1rem;
    -webkit-line-clamp: 2;
  }
}

/* ── Project list ─────────────────────────────────────────────────────────── */
.project-list { list-style: none; }
.project-item { border-bottom: 1px solid var(--dim); }

.project-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 12px;
  align-items: baseline;
  padding: 18px 0;
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}
.project-row:hover { opacity: .75; }

.project-num  { font-size: .7rem; color: var(--muted); letter-spacing: .05em; padding-top: 2px; }
.project-title { font-size: .95rem; color: var(--ink); font-weight: 400; }
.project-tag  { font-size: .72rem; color: var(--muted); letter-spacing: .03em; }
.project-year { font-size: .72rem; color: var(--muted); letter-spacing: .02em; text-align: right; }

/* ── Project detail ───────────────────────────────────────────────────────── */
.project-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
}
.project-detail.open { max-height: 800px; }

.detail-body {
  font-size: .875rem;
  color: var(--warm);
  line-height: 1.75;
  padding: 0 0 20px 40px;
  max-width: 54ch;
}
.detail-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 24px;
  padding: 0 0 20px 40px;
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.stat-value { font-size: .82rem; color: var(--ink); font-weight: 400; }

/* ── Asset rail ───────────────────────────────────────────────────────────── */
.asset-rail { position: relative; overflow: hidden; margin: 0 0 24px 40px; }
.asset-rail.asset-rail--static::before,
.asset-rail.asset-rail--static::after { display: none; }
.asset-rail::before, .asset-rail::after {
  content: '';
  position: absolute;
  top: 0;
  height: 100%;
  width: 28px;
  z-index: 2;
  pointer-events: none;
}
.asset-rail::before { left: 0;  background: linear-gradient(to right, var(--bg), transparent); }
.asset-rail::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }

.asset-track { display: flex; gap: 6px; width: max-content; }
.asset-track.scrolling { animation: rail-scroll var(--rail-dur, 30s) linear infinite; }
.asset-track.scrolling:hover { animation-play-state: paused; }
@keyframes rail-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

.asset-item {
  flex-shrink: 0;
  height: 80px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--dim);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: border-color .15s;
  cursor: pointer;
}
.asset-item:hover { border-color: var(--muted); }
.asset-item.photo { width: 120px; }
.asset-item.video { width: 120px; }
.asset-item.logo  { width: 80px; background: #fff; }

.asset-item img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 8px; box-sizing: border-box; }
.asset-item.logo img { padding: 12px; }

.video-play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,.6);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .6rem;
  pointer-events: none;
  z-index: 1;
}

.asset-label, .photo-label {
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  text-align: center;
  padding: 6px;
  line-height: 1.3;
}

/* ── About view ───────────────────────────────────────────────────────────── */
.about-wrap { padding: 8px 0 48px; }
.about-lead {
  font-size: clamp(.95rem, 2.5vw, 1.05rem);
  color: var(--ink);
  line-height: 1.7;
  font-weight: 400;
  margin-bottom: 28px;
  max-width: 52ch;
}
.about-body {
  font-size: .875rem;
  color: var(--warm);
  line-height: 1.8;
  margin-bottom: 40px;
  max-width: 56ch;
}
.about-body p + p { margin-top: 14px; }
.about-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 16px; }
.about-section-label {
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--muted);
  margin-bottom: 16px;
}
.role-row { margin-bottom: 14px; }
.role-title   { font-size: .82rem; color: var(--ink); font-weight: 400; }
.role-company { font-size: .78rem; color: var(--muted); }
.role-period  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
.area-list { list-style: none; }
.area-list li {
  font-size: .82rem;
  color: var(--warm);
  padding: 6px 0;
  border-bottom: 1px solid var(--dim);
}
.area-list li:last-child { border-bottom: none; }

/* ── Notes view ───────────────────────────────────────────────────────────── */
.notes-header {
  padding: 8px 0 28px;
  border-bottom: 1px solid var(--dim);
}
.notes-header p { font-size: .82rem; color: var(--muted); }
.notes-list { list-style: none; }
.note-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--dim);
}
.note-title { font-size: .9rem; color: var(--ink); font-weight: 400; flex: 1; }
.note-sub   { font-size: .75rem; color: var(--muted); margin-top: 3px; }
.note-type  { font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); flex-shrink: 0; }
.note-sub-detail { font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 0 0 8px 40px; }
.note-empty { font-size: .78rem; color: var(--muted); padding: 12px 0 20px 28px; }

/* Substack post entries in notes */
.substack-excerpt {
  font-size: .875rem;
  color: var(--warm);
  line-height: 1.75;
  padding: 0 0 16px 40px;
  max-width: 54ch;
}
.substack-link {
  display: inline-block;
  margin: 0 0 20px 40px;
  font-size: .75rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: .03em;
  transition: color .15s;
}
.substack-link:hover { color: var(--ink); }
.note-date {
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .02em;
}

/* ── Footer ───────────────────────────────────────────────────────────────── */
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 28px 0 36px;
  border-top: 1px solid var(--dim);
  margin-top: 48px;
  font-size: .72rem;
  color: var(--muted);
  flex-wrap: wrap;
}
.footer-links { display: flex; gap: 16px; }
.footer-links a { color: var(--muted); text-decoration: none; transition: color .15s; }
.footer-links a:hover { color: var(--ink); }

/* ── Lightbox ─────────────────────────────────────────────────────────────── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.lightbox.open { display: flex; }
.lightbox-inner { position: relative; max-width: 90vw; max-height: 88vh; cursor: default; }
.lightbox-inner img { display: block; max-width: 90vw; max-height: 84vh; object-fit: contain; cursor: default; }
.lightbox-caption {
  font-size: .72rem;
  color: rgba(255,255,255,.5);
  text-align: center;
  margin-top: 10px;
  letter-spacing: .03em;
}
.lightbox-close {
  position: absolute;
  top: -32px;
  right: 0;
  font-size: .8rem;
  color: rgba(255,255,255,.5);
  cursor: pointer;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.lightbox-close:hover { color: #fff; }

.lightbox-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.8rem;
  line-height: 1;
  color: rgba(255,255,255,.5);
  cursor: pointer;
  padding: 14px 18px;
  user-select: none;
  transition: color .15s;
  z-index: 101;
  background: none;
  border: none;
  font-family: inherit;
}
.lightbox-nav:hover { color: #fff; }
.lightbox-prev { left: 4px; }
.lightbox-next { right: 4px; }
</style>
</head>
<body>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <button id="lb-prev" class="lightbox-nav lightbox-prev" onclick="lbPrev(event)" aria-label="Previous image">‹</button>
  <div class="lightbox-inner">
    <span class="lightbox-close" onclick="closeLightbox(event)">Close</span>
    <img id="lb-img" src="" alt="" />
    <div id="lb-caption" class="lightbox-caption"></div>
  </div>
  <button id="lb-next" class="lightbox-nav lightbox-next" onclick="lbNext(event)" aria-label="Next image">›</button>
</div>

<div class="wrap">
  <header>
    <div class="site-name" onclick="switchView('work')">Ben Fainlight</div>
    <div class="header-right">
      <nav>
        <button id="nav-work"  class="active" onclick="switchView('work')">Work</button>
        <button id="nav-about"             onclick="switchView('about')">About</button>
        <button id="nav-notes"             onclick="switchView('notes')">Notes</button>
      </nav>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">○</button>
    </div>
  </header>

  <!-- Work -->
  <div id="view-work" class="view active">
    <div class="intro">
      <div class="intro-row">
        <p id="intro-text" class="intro-bio"></p>

        <div class="links-zone" id="links-zone">
          <!-- Background image overlay — appears on hover when current item has an img -->
          <div class="links-bg" id="links-bg" aria-hidden="true"></div>

          <!-- Rotating content -->
          <div class="links-content">
            <p class="links-outlet" id="links-outlet"></p>
            <a class="links-title" id="links-title" href="#" target="_blank" rel="noopener"></a>
            <p class="links-desc" id="links-desc"></p>
            <div class="links-controls">
              <div class="links-dots" id="links-dots"></div>
              <button class="links-next" id="links-next">next →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <ul class="project-list" id="project-list"></ul>
  </div>

  <!-- About -->
  <div id="view-about" class="view">
    <div class="about-wrap" id="about-content"></div>
  </div>

  <!-- Notes -->
  <div id="view-notes" class="view">
    <div class="notes-header"><p>Things I keep coming back to. Updated when there's something worth saying.</p></div>
    <ul class="notes-list" id="notes-list"></ul>
  </div>

  <footer>
    <span id="footer-copy"></span>
    <div class="footer-links" id="footer-links"></div>
  </footer>
</div>

<script>
/* ── Helpers ──────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Theme ────────────────────────────────────────────────────────────────── */
// If the visitor has never toggled the theme on this site, default to
// their OS/browser color-scheme preference. Once they explicitly toggle,
// that choice is saved and always wins over the system preference.
(function() {
  var saved = localStorage.getItem('bf-theme');
  var theme = saved || (
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark'
  );
  document.documentElement.setAttribute('data-theme', theme);
})();

function toggleTheme() {
  var html  = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  var next   = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '○' : '●';
  localStorage.setItem('bf-theme', next);
}

// Set correct icon on load
document.addEventListener('DOMContentLoaded', function() {
  var t = document.documentElement.getAttribute('data-theme');
  document.getElementById('theme-btn').textContent = t === 'dark' ? '○' : '●';
});

/* ── Views ────────────────────────────────────────────────────────────────── */
function switchView(name) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

/* ── Project rows ─────────────────────────────────────────────────────────── */
function toggleDetail(row) {
  var detail = row.nextElementSibling;
  var isOpen = detail.classList.contains('open');
  document.querySelectorAll('.project-detail.open').forEach(function(d) {
    if (d !== detail) d.classList.remove('open');
  });
  detail.classList.toggle('open', !isOpen);
  if (!isOpen) {
    var rail = detail.querySelector('.asset-rail');
    if (rail) initAssetRail(rail);
  }
}

/* ── Asset rail ───────────────────────────────────────────────────────────── */
function initAssetRail(rail) {
  if (rail.dataset.init) return;
  rail.dataset.init = '1';
  var track = rail.querySelector('.asset-track');
  if (!track) return;
  setTimeout(function() {
    var cw = rail.clientWidth;
    var tw = track.scrollWidth;
    if (tw > cw + 4) {
      Array.from(track.children).forEach(function(child) {
        track.appendChild(child.cloneNode(true));
      });
      var dur = Math.round(tw / 28);
      track.style.setProperty('--rail-dur', dur + 's');
      track.classList.add('scrolling');
    } else {
      rail.classList.add('asset-rail--static');
    }
  }, 60);
}

/* ── Image fallback ───────────────────────────────────────────────────────── */
function imgFallback(img) {
  var item = img.closest('.asset-item');
  if (!item) return;
  img.style.display = 'none';
  if (!item.querySelector('.asset-label, .photo-label')) {
    var label = document.createElement('span');
    label.className = item.classList.contains('logo') ? 'asset-label' : 'photo-label';
    label.textContent = img.alt || '—';
    item.appendChild(label);
  }
}

/* ── Lightbox ─────────────────────────────────────────────────────────────── */
var lbItems = [];
var lbIndex = 0;

// Scrolling rails clone their full child set once for the seamless loop;
// collapse that exact repeat so prev/next don't double back on themselves.
function dedupeCycle(items) {
  var n = items.length;
  if (n % 2 === 0) {
    var half = n / 2;
    var isDup = true;
    for (var i = 0; i < half; i++) {
      if (items[i].src !== items[i + half].src || items[i].caption !== items[i + half].caption) { isDup = false; break; }
    }
    if (isDup) return items.slice(0, half);
  }
  return items;
}

function renderLightboxImage() {
  var it = lbItems[lbIndex];
  if (!it) return;
  document.getElementById('lb-img').src = it.src;
  document.getElementById('lb-caption').textContent = it.caption || '';
  var showNav = lbItems.length > 1;
  document.getElementById('lb-prev').style.display = showNav ? '' : 'none';
  document.getElementById('lb-next').style.display = showNav ? '' : 'none';
}

function openLightbox(items, index) {
  lbItems = items;
  lbIndex = index;
  renderLightboxImage();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  var inner = document.querySelector('.lightbox-inner');
  if (e && inner && inner.contains(e.target) && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function() { document.getElementById('lb-img').src = ''; }, 200);
}
function lbPrev(e) {
  if (e) e.stopPropagation();
  if (!lbItems.length) return;
  lbIndex = (lbIndex - 1 + lbItems.length) % lbItems.length;
  renderLightboxImage();
}
function lbNext(e) {
  if (e) e.stopPropagation();
  if (!lbItems.length) return;
  lbIndex = (lbIndex + 1) % lbItems.length;
  renderLightboxImage();
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') lbPrev();
  else if (e.key === 'ArrowRight') lbNext();
});

/* ── Click delegation ─────────────────────────────────────────────────────── */
document.addEventListener('click', function(e) {
  var item = e.target.closest('.asset-item');
  if (!item) return;
  if (item.dataset.link) {
    window.open(item.dataset.link, '_blank', 'noopener,noreferrer');
  } else if (item.dataset.lightbox) {
    var track = item.closest('.asset-track');
    var nodes = track ? Array.from(track.querySelectorAll('.asset-item[data-lightbox]')) : [item];
    var items = dedupeCycle(nodes.map(function(n) {
      return { src: n.dataset.lightbox, caption: n.dataset.caption || '' };
    }));
    var idx = items.findIndex(function(it) {
      return it.src === item.dataset.lightbox && it.caption === (item.dataset.caption || '');
    });
    openLightbox(items, idx < 0 ? 0 : idx);
  }
});

/* ── Render tile ──────────────────────────────────────────────────────────── */
function renderTile(tile) {
  var cls    = 'asset-item ' + (tile.type || 'logo');
  var action = '';
  if (tile.action === 'lightbox' && tile.img) {
    action = ' data-lightbox="' + esc(tile.img) + '" data-caption="' + esc(tile.caption || '') + '"';
  } else if (tile.action === 'link' && tile.link) {
    action = ' data-link="' + esc(tile.link) + '"';
  }

  var inner = '';
  if (tile.img) {
    inner = '<img src="' + esc(tile.img) + '" alt="' + esc(tile.label || '') + '" onerror="imgFallback(this)" />';
  } else {
    var labelCls = (tile.type === 'photo' || tile.type === 'video') ? 'photo-label' : 'asset-label';
    inner = '<span class="' + labelCls + '">' + esc(tile.label || '') + '</span>';
  }
  if (tile.type === 'video') {
    inner += '<span class="video-play-icon" aria-hidden="true">▶</span>';
  }
  return '<div class="' + cls + '"' + action + '>' + inner + '</div>';
}

/* ── Render project ───────────────────────────────────────────────────────── */
function renderProject(p) {
  var stats = (p.stats || []).map(function(s) {
    return '<div class="stat">'
      + '<span class="stat-label">' + esc(s.label) + '</span>'
      + '<span class="stat-value">' + esc(s.value) + '</span>'
      + '</div>';
  }).join('');

  var tiles = (p.rail || []).map(renderTile).join('');

  return '<li class="project-item">'
    + '<div class="project-row" onclick="toggleDetail(this)">'
    + '<span class="project-num">'   + esc(p.num)   + '</span>'
    + '<span class="project-title">' + esc(p.title) + '</span>'
    + '<span class="project-tag">'   + esc(p.tag)   + '</span>'
    + '<span class="project-year">'  + esc(p.year)  + '</span>'
    + '</div>'
    + '<div class="project-detail">'
    + '<p class="detail-body">' + esc(p.body) + '</p>'
    + '<div class="detail-stats">' + stats + '</div>'
    + (tiles ? '<div class="asset-rail"><div class="asset-track">' + tiles + '</div></div>' : '')
    + '</div>'
    + '</li>';
}

/* ── Render about ─────────────────────────────────────────────────────────── */
function renderAbout(about) {
  var bodyParagraphs = (about.body || []).map(function(p) {
    return '<p>' + esc(p) + '</p>';
  }).join('');

  var roles = (about.roles || []).map(function(r) {
    return '<div class="role-row">'
      + '<div class="role-title">' + esc(r.title) + '</div>'
      + '<div class="role-company">' + esc(r.company) + '</div>'
      + '<div class="role-period">' + esc(r.period) + '</div>'
      + '</div>';
  }).join('');

  var areas = (about.areas || []).map(function(a) {
    return '<li>' + esc(a) + '</li>';
  }).join('');

  return '<p class="about-lead">' + esc(about.lead || '') + '</p>'
    + '<div class="about-body">' + bodyParagraphs + '</div>'
    + '<div class="about-cols">'
    + '<div><p class="about-section-label">Experience</p>' + roles + '</div>'
    + '<div><p class="about-section-label">Areas</p><ul class="area-list">' + areas + '</ul></div>'
    + '</div>';
}

/* ── Render Substack post ─────────────────────────────────────────────────── */
function renderSubstackPost(post) {
  // Format date: "Jun 2025" style
  var dateStr = '';
  if (post.date) {
    try {
      var d = new Date(post.date);
      dateStr = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    } catch(_) {}
  }

  return '<li class="project-item">'
    + '<div class="project-row" onclick="toggleDetail(this)">'
    + '<span class="project-num"></span>'
    + '<span class="project-title">' + esc(post.title) + '</span>'
    + '<span class="project-tag">' + esc(post.type) + '</span>'
    + '<span class="project-year note-date">' + esc(dateStr) + '</span>'
    + '</div>'
    + '<div class="project-detail">'
    + (post.excerpt
        ? '<p class="substack-excerpt">' + esc(post.excerpt) + '</p>'
        : '')
    + '<a class="substack-link" href="' + esc(post.link) + '" target="_blank" rel="noopener">Read on Substack →</a>'
    + '</div>'
    + '</li>';
}

/* ── Render notes ─────────────────────────────────────────────────────────── */
function renderNotes(notes) {
  return (notes || []).map(function(n) {
    var tiles = (n.assets || []).map(renderTile).join('');
    var hasBody = n.body && n.body.trim();
    var detail = '<p class="note-sub-detail">' + esc(n.sub) + '</p>';
    if (hasBody) {
      detail += '<p class="detail-body">' + esc(n.body) + '</p>';
    }
    if (tiles) {
      detail += '<div class="asset-rail"><div class="asset-track">' + tiles + '</div></div>';
    }
    if (!hasBody && !tiles) {
      detail += '<p class="note-empty">More on this soon.</p>';
    }

    return '<li class="project-item">'
      + '<div class="project-row" onclick="toggleDetail(this)">'
      + '<span class="project-num"></span>'
      + '<span class="project-title">' + esc(n.title) + '</span>'
      + '<span class="project-tag">' + esc(n.type) + '</span>'
      + '<span class="project-year"></span>'
      + '</div>'
      + '<div class="project-detail">'
      + detail
      + '</div>'
      + '</li>';
  }).join('');
}

/* ── Links zone ───────────────────────────────────────────────────────────── */
function initLinksZone(linksData) {
  if (!linksData || !linksData.length) return;

  var zoneEl   = document.getElementById('links-zone');
  var bgEl     = document.getElementById('links-bg');
  var outletEl = document.getElementById('links-outlet');
  var titleEl  = document.getElementById('links-title');
  var descEl   = document.getElementById('links-desc');
  var dotsEl   = document.getElementById('links-dots');
  var nextBtn  = document.getElementById('links-next');
  if (!zoneEl) return;

  var cur       = 0;
  var animating = false;
  var hovered   = false;

  linksData.forEach(function(_, i) {
    var dot = document.createElement('button');
    dot.className = 'links-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Item ' + (i + 1));
    dot.addEventListener('click', function() { goTo(i); });
    dotsEl.appendChild(dot);
  });

  function updateDots() {
    dotsEl.querySelectorAll('.links-dot').forEach(function(d, i) {
      d.classList.toggle('active', i === cur);
    });
  }

  function applyBg(item) {
    if (!bgEl) return;
    if (item.img) {
      bgEl.style.backgroundImage = 'url("' + item.img + '")';
      if (hovered) bgEl.style.opacity = '0.13';
    } else {
      bgEl.style.opacity = '0';
    }
  }

  function goTo(n) {
    if (animating) return;
    animating = true;

    [outletEl, titleEl, descEl].forEach(function(el) { el.style.opacity = '0'; });

    var nextItem = linksData[(n + linksData.length) % linksData.length];
    if (bgEl && hovered && nextItem.img !== linksData[cur].img) {
      bgEl.style.opacity = '0';
    }

    setTimeout(function() {
      cur = (n + linksData.length) % linksData.length;
      var item = linksData[cur];
      outletEl.textContent = item.outlet;
      titleEl.textContent  = item.title;
      titleEl.href         = item.url;
      descEl.textContent   = item.desc;
      [outletEl, titleEl, descEl].forEach(function(el) { el.style.opacity = '1'; });
      updateDots();
      applyBg(item);
      animating = false;
    }, 220);
  }

  outletEl.textContent = linksData[0].outlet;
  titleEl.textContent  = linksData[0].title;
  titleEl.href         = linksData[0].url;
  descEl.textContent   = linksData[0].desc;
  if (linksData[0].img) bgEl.style.backgroundImage = 'url("' + linksData[0].img + '")';

  nextBtn.addEventListener('click', function() { goTo(cur + 1); });

  if (zoneEl && bgEl) {
    zoneEl.addEventListener('mouseenter', function() {
      hovered = true;
      if (linksData[cur].img) bgEl.style.opacity = '0.13';
    });
    zoneEl.addEventListener('mouseleave', function() {
      hovered = false;
      bgEl.style.opacity = '0';
    });
  }

  setInterval(function() { goTo(cur + 1); }, 6000);
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
Promise.all([
  fetch('/api/content').then(function(r) { return r.json(); }),
  fetch('/api/substack').then(function(r) { return r.json(); }).catch(function() { return []; })
]).then(function(results) {
  var c = results[0];
  var substackPosts = results[1];

  // Intro
  var introEl = document.getElementById('intro-text');
  if (introEl && c.intro) introEl.innerHTML = c.intro;

  // Projects
  var listEl = document.getElementById('project-list');
  if (listEl) listEl.innerHTML = (c.projects || []).map(renderProject).join('');

  // Links zone
  initLinksZone(c.links);

  // About
  var aboutEl = document.getElementById('about-content');
  if (aboutEl && c.about) aboutEl.innerHTML = renderAbout(c.about);

  // Notes — Substack posts first (newest → oldest), manual notes below
  var notesEl = document.getElementById('notes-list');
  if (notesEl) {
    var substackHtml = substackPosts.map(renderSubstackPost).join('');
    var manualHtml   = renderNotes(c.notes);
    notesEl.innerHTML = substackHtml + manualHtml;
  }

  // Footer
  var copyEl = document.getElementById('footer-copy');
  if (copyEl && c.meta) copyEl.textContent = '© ' + c.meta.copyright;

  var linksEl = document.getElementById('footer-links');
  if (linksEl && c.contact) {
    var links = [];
    if (c.contact.email)     links.push('<a href="mailto:' + esc(c.contact.email) + '">Email</a>');
    if (c.contact.instagram) links.push('<a href="' + esc(c.contact.instagram) + '" target="_blank" rel="noopener">Instagram</a>');
    if (c.contact.linkedin)  links.push('<a href="' + esc(c.contact.linkedin)  + '" target="_blank" rel="noopener">LinkedIn</a>');
    linksEl.innerHTML = links.join('');
  }

  // Update page title
  if (c.meta && c.meta.name) document.title = c.meta.name;
}).catch(function(err) {
  console.error('Failed to load content:', err);
});
</script>
